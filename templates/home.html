<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/main.css">
</head>
<body>
    {% if filenames %}
        <div class="links">
        {% for file in filenames %}
            <a href="{{url_for('download', filename=file)}}" class="element">{{file}}</a>
        {%endfor%}
        <div>
    {% endif %}

    <form action="{{url_for('home')}}" method="post" enctype="multipart/form-data" class="submission_form">
        <div class="item">
            <input type="file" name="file">
            <input type="submit" value="Upload File">
        </div>
    </form>

</body>
</html>
